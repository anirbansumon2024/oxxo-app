name: Android Optimized Release Build

on:
  push:
    branches: [ "main", "master" ] # আপনার ব্রাঞ্চের নাম অনুযায়ী পরিবর্তন করুন
  workflow_dispatch: # ম্যানুয়ালি বিল্ড দেওয়ার জন্য

permissions:
  contents: write # রিলিজ তৈরি করার পারমিশন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install NDK
      run: |
        echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.3.6528147"

    - name: Grant Execute Permission
      run: chmod +x gradlew

    - name: Build Optimized APKs
      run: ./gradlew assembleDebug --stacktrace

    - name: Generate Release Tag
      id: tag
      run: |
        # আপনার ভার্সন নাম্বার অনুযায়ী ট্যাগ জেনারেট হবে
        echo "TAG_NAME=v1.3.9-build-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.TAG_NAME }}
        name: Automated Build ${{ steps.tag.outputs.TAG_NAME }}
        body: |
          ### Automated Android Build
          - **Version:** 1.3.9.d
          - **Build Date:** ${{ github.event.head_commit.timestamp }}
          - **Commit:** ${{ github.sha }}
          
          নিচের আর্কিটেকচার অনুযায়ী আপনার ডিভাইসের জন্য সঠিক APK টি ডাউনলোড করুন।
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
