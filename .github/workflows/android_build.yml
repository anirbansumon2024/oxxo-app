name: Android Optimized Release Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix Line Endings and Grant Permission
      run: |
        # gradlew ফাইল থেকে উইন্ডোজের \r ক্যারেক্টার রিমুভ করার জন্য
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Install NDK
      run: |
        echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.3.6528147"

    - name: Build Optimized APKs
      run: ./gradlew assembleDebug --stacktrace

    - name: Generate Release Tag
      id: tag
      run: |
        echo "TAG_NAME=v1.3.9-build-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.TAG_NAME }}
        name: Automated Build ${{ steps.tag.outputs.TAG_NAME }}
        body: |
          ### Automated Android Build
          - **Version:** 1.3.9.d
          - **Build Date:** $(date)
          
          নিচের লিস্ট থেকে আপনার ফোনের আর্কিটেকচার অনুযায়ী APK ডাউনলোড করুন।
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
